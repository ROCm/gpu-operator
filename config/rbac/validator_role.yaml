apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-operator-validator-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  - services
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - amd.com
  resources:
  - deviceconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - amd.com
  resources:
  - deviceconfigs/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - kmm.sigs.x-k8s.io
  resources:
  - modules
  - nodemodulesconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argoproj.io
  resources:
  - workflows
  - workflowtemplates
  verbs:
  - get
  - list
  - watch
