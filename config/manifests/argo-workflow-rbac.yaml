---
# This RBAC is only included in OLM bundles, not in Helm charts
# It provides permissions needed for Argo Workflow integration when remediation is enabled
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-argo-workflow-role
rules:
- apiGroups:
  - argoproj.io
  resources: [workflows, workflowtemplates]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups:
  - argoproj.io
  resources: [workflowtaskresults]
  verbs: [create, patch]
- apiGroups:
  - argoproj.io
  resources: [workflows/finalizers]
  verbs: [update]
- apiGroups:
  - batch
  resources: [jobs]
  verbs: [get, list, watch, create, patch, delete]
- apiGroups:
  - ""
  resources: [pods/log]
  verbs: [get]
- apiGroups:
  - ""
  resources: [serviceaccounts]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-argo-workflow-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-argo-workflow-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
