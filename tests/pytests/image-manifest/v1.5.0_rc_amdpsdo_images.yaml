            location    : container://<registry>/rocm/k8s-device-plugin
            version     : latest
            kind        : container

        node-labeller:
            key         : devicePlugin.nodeLabellerImage
            location    : container://<registry>/rocm/k8s-device-plugin
            version     : labeller-latest
            kind        : container

        init-container-image:
            key         : commonConfig.initContainerImage
            location    : container://registry.test.pensando.io:5000/busybox
            version     : 1.36
            kind        : container

        dra-driver-image:
            key         : draDriver.image
            location    : container://registry.test.pensando.io:5000/k8s-gpu-dra-driver
            version     : 5a66d18e
            kind        : container
            secret      : docker-amdpsdo-auth

    standalone:
        driver:
            key         : driver.image
            location    : container://registry.test.pensando.io:5000/amdgpu_kmod
            kind        : container

        gpu-operator:
            location    : file:///gpu-operator/tests/pytests/downloads/gpu-operator-helm-k8s-v1.5.0-v1.4.1-28.tgz
            version     : v1.5.0-28
            kind        : helm-chart

        gpu-controller-manager:
            key         : controllerManager.manager.image
            location    : container://<registry>/amdpsdo/gpu-operator
            version     : v1.5.0-28
            kind        : container
