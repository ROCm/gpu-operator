            version     : v1.5.0-1
            kind        : container
            secret      : docker-amdpsdo-auth

        kmm-controller-manager:
            key         : kmm.controller.manager.image
            location    : container://<registry>/amdpsdo/kernel-module-management-operator
            version     : v1.5.0-1
            kind        : container
            secret      : docker-amdpsdo-auth

        kmm-webhook-server:
            key         : kmm.webhookServer.webhookServer.image
            location    : container://<registry>/amdpsdo/kernel-module-management-webhook-server
            version     : v1.5.0-1
            kind        : container
            secret      : docker-amdpsdo-auth

        init-container-image:
            key         : commonConfig.initContainerImage
