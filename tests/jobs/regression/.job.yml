---
version: 2.0
meta:


image:
  bind_dir: "/gpu-operator"
  work_dir: "/gpu-operator"
  

e2e-targets:
  gpu-operator-regression-mi210:
    commands: [
        "/bin/sh",
        "-c",
        "cat /warmd.json && cd /gpu-operator/tests/pytests && \
         /gpu-operator/ci-internal/run_sanity.sh --app gpu-operator \
         --registry direct --testbed /warmd.json --amdgpu-driver default-deviceconfig"
    ]
    owners: ["email:srivatsa.sangli@amd.com"]
    tcp-ports: [5000]
    area:
    sub-area:
    max-duration: 10h
    build-dependencies:
      - build-gpu-operator
      - build-gpu-operator-k8s
    resources:
    - generic:
      - type: GPUOP-Cluster
        vendor: Pensando
        props:
          - name: gpu-series
            value: MI210
          - name: testbed-type
            value: K8
        count: 1

