name: Unit Tests

on:
  pull_request:
    branches:
    - main
    - 'release-*'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Run unit tests
        run: make unit-test
