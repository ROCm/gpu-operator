name: Build

on:
  pull_request:
    branches:
    - main
    - 'release-*'
    types: [labeled]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'CI-Run')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and run all targets
        run: >
          make default
          DOCKER_CACHE_FROM="type=gha"
          DOCKER_CACHE_TO="type=gha,mode=max"
