name: Build

on:
  pull_request:
    branches:
    - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
      - name: Resolve builder image tag from Makefile
        id: builder
        run: |
          # Read the exact image:tag and base image the Makefile uses (-n = dry run,
          # no execution) so the build below can't drift from local `make` behavior.
          BUILDER_IMAGE=$(make -s -n -p 2>/dev/null \
            | sed -nE 's/^DOCKER_BUILDER_IMAGE :?= //p' | head -1)
          BUILD_BASE_IMG=$(make -s -n -p 2>/dev/null \
            | sed -nE 's/^BUILD_BASE_IMG :?= //p' | head -1)
          echo "Resolved builder image: $BUILDER_IMAGE (base: $BUILD_BASE_IMG)"
          echo "image=$BUILDER_IMAGE" >> "$GITHUB_OUTPUT"
          echo "base=${BUILD_BASE_IMG:-ubuntu:22.04}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build the dev/build container image (with GHA layer cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.build
          tags: ${{ steps.builder.outputs.image }}
          build-args: |
            BUILD_BASE_IMG=${{ steps.builder.outputs.base }}
          push: false
          load: true            # load into the local daemon so later `docker run` can use it
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run make targets inside the container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/gpu-operator \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /gpu-operator \
            ${{ steps.builder.outputs.image }} \
            bash -ic "export PATH=/gpu-operator/bin:\$(go env GOPATH)/bin:\$PATH && git config --global --add safe.directory /gpu-operator && make all"

  copyright-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
      - name: Resolve builder image tag from Makefile
        id: builder
        run: |
          # Read the exact image:tag and base image the Makefile uses (-n = dry run,
          # no execution) so the build below can't drift from local `make` behavior.
          BUILDER_IMAGE=$(make -s -n -p 2>/dev/null \
            | sed -nE 's/^DOCKER_BUILDER_IMAGE :?= //p' | head -1)
          BUILD_BASE_IMG=$(make -s -n -p 2>/dev/null \
            | sed -nE 's/^BUILD_BASE_IMG :?= //p' | head -1)
          echo "Resolved builder image: $BUILDER_IMAGE (base: $BUILD_BASE_IMG)"
          echo "image=$BUILDER_IMAGE" >> "$GITHUB_OUTPUT"
          echo "base=${BUILD_BASE_IMG:-ubuntu:22.04}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build the dev/build container image (with GHA layer cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.build
          tags: ${{ steps.builder.outputs.image }}
          build-args: |
            BUILD_BASE_IMG=${{ steps.builder.outputs.base }}
          push: false
          load: true            # load into the local daemon so later `docker run` can use it
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run copyright checks inside the container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/gpu-operator \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /gpu-operator \
            ${{ steps.builder.outputs.image }} \
            bash -ic "export PATH=/gpu-operator/bin:\$(go env GOPATH)/bin:\$PATH && git config --global --add safe.directory /gpu-operator && make copyrights"
            
