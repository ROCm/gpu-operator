# Ansible Configuration for GPU Validation Cluster
#
# SECURITY NOTE: Host key checking is ENABLED by default for security.
# For lab/testing environments where you trust the network and want to skip
# host key verification, you can disable it by uncommenting these lines:
#   [defaults] section: host_key_checking = False
#   [ssh_connection] section: add -o StrictHostKeyChecking=no to ssh_args
#
# To accept host keys for known hosts, run:
#   ssh-keyscan -H <hostname> >> ~/.ssh/known_hosts

[defaults]
inventory = inventory.yml
# host_key_checking = False  # Uncomment for insecure lab environments only
retry_files_enabled = False
roles_path = ./roles
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
